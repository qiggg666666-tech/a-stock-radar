name: A-Stock Screener
on:
  workflow_dispatch:
    inputs:
      strategy:
        description: '选择选股策略'
        required: true
        default: 'first_red'
        type: choice
        options:
        - first_red
        - long_term_reversal
  schedule:
    - cron: '30 7 * * *' # 北京时间 15:30 自动执行

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install akshare pandas requests google-generativeai
      - name: Run Screener
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python main.py --strategy ${{ github.event.inputs.strategy || 'first_red' }}
