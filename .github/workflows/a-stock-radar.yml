name: A-Stock Radar

# =====================================================================
# 整合版 workflow（整文件覆盖原 yml；19 个 job 全保留，顺序与原版一致便于 diff）
# ---------------------------------------------------------------------
# 相对原版的改动（仅此这些，run 命令 / cron 时间 / if 条件 / 密钥映射全部原样）：
#   1) 14 个"选股/板块/监控/指数"job 各补 upload-artifact（path: output/，
#      if-no-files-found: warn → 某天没命中、output 为空时只警告不红叉）。
#   2) timeout 微调：cox 25→60、mtf 180→90、ma520-bottom 150→180（匹配升级后耗时）。
#   3) 升级 job 的 env 在密钥之外，显式声明 1 个最常用旋钮（带默认值，方便网页改）。
#   4) backtest 的前 3 个回测 step 加 continue-on-error: true（一个挂不连带 skip 后面；
#      该 step 仍会在日志标红，只是不阻断；check_cagr 不加，挂了仍让 job 红以提醒）。
#   5) build-calibration 在 commit 之后补一个可选 upload-artifact（看分箱 json 明细）。
# 未改动：顶层不加 permissions（仅 build-calibration job 级 contents: write）；
#         backtest 不加 artifact（其产物路径未统一进 output/，避免引用空路径）。
# 提醒：cron '30 8 * * *' 被 main-screener 与 index-support-resistance 共用（原版如此），
#       故每天 08:30 这两个 job 会并发触发——不报错，仅提示，未擅自改时间。
# 用法：commit 到 main → Actions 点「Run workflow」新开（勿 Re-run，Re-run 吃旧快照）。
# =====================================================================

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * *'   # 主策略：三线共振/周线宽松  ★双源+板块
    - cron: '40 8 * * *'   # 强势股延续（保守版）      ★双源+板块
    - cron: '50 8 * * *'   # 板块优选+信号流水线       ★双源+板块榜
    - cron: '00 9 * * *'   # PE/PB估值筛选            ★双源+板块榜
    - cron: '10 9 * * *'   # 520天首红信号            ★双源+板块
    - cron: '20 9 * * *'   # 每日大盘信号             ★双源+加固
    - cron: '30 9 * * *'   # MA5横盘筛选              ★双源+板块
    - cron: '40 9 * * *'   # 520日线低位综合筛选       ★双源+板块
    - cron: '50 9 * * *'   # 板块动量+估值分位         ★双源+板块榜
    - cron: '0 8 * * *'    # 资金异动监控（收盘后）     ★加固+留痕
    - cron: '0 8 * * 5'    # 外资/中央结算持股监控（每周五）★加固+留痕
    - cron: '10 8 * * *'   # 板块轮动预警（收盘后）     ★双源+板块榜
    - cron: '20 8 * * *'   # 指数MACD背离监控（收盘后） ★双源+加固
    - cron: '30 8 * * *'   # 指数支撑阻力位（收盘后）   ★双源+加固  ⚠与main同cron,08:30并发
    - cron: '35 8 * * 1-5' # 量化信号分析（工作日收盘后）
    - cron: '45 8 * * 1-5' # COX全板块选股(超卖反弹)   ★双源+板块
    - cron: '55 8 * * *'   # MTF共振选股(趋势起涨)     ★双源+板块
    - cron: '0 3 1 * *'    # 每月1号，重算校准表        ★加固

jobs:
  # ===================== 选股层 =====================
  main-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Main Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          SCAN_LIMIT: '500'          # 可选: 主策略扫描上限(0=全扫)
        run: python main.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: main-screener-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  strong-continuation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '40 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Strong Continuation Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          SCAN_LIMIT: '0'            # 可选: 0=全扫; 想快填2000
        run: python strong_continuation.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: strong-continuation-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  first-red-520-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '10 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run 520-Day First Red Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          SCAN_LIMIT: '0'            # 可选: 0=全扫
        run: python first_red_520.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: first-red-520-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  ma5-sideways-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run MA5 Sideways Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          SCAN_LIMIT: '0'            # 可选: 0=全扫
        run: python ma5_sideways.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ma5-sideways-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  ma520-bottom-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '40 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run MA520 Bottom Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          SCAN_LIMIT: '0'            # 可选: 0=全扫(4年数据重, 想快填2000)
        run: python ma520_bottom_screener.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ma520-bottom-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  valuation-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '00 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Valuation Screener (PE/PB)
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          UNIVERSE: ALL              # 可选: 估值默认全A; 聚焦填 HS300/ZZ500
        run: python valuation_screen.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: valuation-screen-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  cox-sector-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '45 8 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run COX Sector Bot
        env:
          SERVERCHAN_KEY: ${{ secrets.SENDKEY }}
          MAX_CANDIDATES: '600'      # 可选: 精算上限(扩大扫描调大, 更慢更易限流)
        run: python cox_sector_bot.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: cox-sector-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  mtf-resonance-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '55 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run MTF Resonance Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          MAX_CANDIDATES: '500'      # 可选: 精算上限
        run: python mtf_resonance_screener.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: mtf-resonance-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  # ===================== 板块层 =====================
  sector-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '50 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Sector Pipeline
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          SECTOR_STOCK_LIMIT: '800'  # 可选: 板块打分样本量
        run: python pipeline_sector_plus_signal.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: sector-pipeline-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  sector-momentum-valuation:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '50 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Sector Momentum + Valuation Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          SECTOR_STOCK_LIMIT: '1500' # 可选: 越大越全越慢
        run: python sector_momentum_valuation.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: sector-momentum-valuation-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  sector-rotation-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '10 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Sector Rotation Alert
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          SECTOR_STOCK_LIMIT: '1500' # 可选
        run: python sector_rotation_alert.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: sector-rotation-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  # ===================== 监控层 =====================
  market-fund-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Market Fund Alert
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          THRESHOLD_VOLUME: '1.5'    # 可选: 放量倍数阈值
        run: python market_fund_alert.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: market-fund-alert-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  foreign-holder-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * 5'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Foreign Holder Monitor
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python foreign_holder_monitor.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: foreign-holder-results
          path: output/
          retention-days: 90         # 季度数据, 留久一点便于环比
          if-no-files-found: warn

  # ===================== 指数层 =====================
  daily-market-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '20 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Daily Market Signal
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python daily_market_signal.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: daily-market-signal-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  index-divergence-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '20 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Index Divergence Alert
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          LOOKBACK_DAYS: '1500'      # 可选
        run: python index_divergence_alert.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: index-divergence-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  index-support-resistance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Index Support Resistance
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          INDEX_CODE: 'sh.000001'    # 可选: 改算沪深300等(同时改 INDEX_NAME)
        run: python index_support_resistance.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: index-support-resistance-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  # ===================== 量化信号（原样保留中文字体+artifact）=====================
  quant-signal-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '35 8 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Chinese font (for chart rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei
      - name: Run Quant Signal Bot
        env:
          SERVERCHAN_KEY: ${{ secrets.SENDKEY }}
        run: python quant_signal_bot.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: quant-signal-results
          path: output/
          retention-days: 30
          if-no-files-found: warn

  # ===================== 校准链路（保留 permissions + commit；补可选 artifact）=====================
  build-calibration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 1 * *'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Build Calibration
        run: python build_calibration.py
      - name: Commit calibration_table.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calibration_table.csv
          git diff --staged --quiet || git commit -m "自动更新: 大盘信号校准表 $(date +'%Y-%m-%d')"
          git push
      - name: Upload calibration detail
        uses: actions/upload-artifact@v4
        with:
          name: calibration-detail
          path: output/
          retention-days: 90
          if-no-files-found: warn

  # ===================== 回测（手动触发；前3步 continue-on-error 防连带 skip）=====================
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Backtest
        continue-on-error: true      # 挂了不阻断后续回测；日志仍标红
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python backtest.py
      - name: Run Breakout Calmar Backtest
        continue-on-error: true
        run: python breakout_calmar_backtest.py
      - name: Run First-Red-520 Backtest
        continue-on-error: true
        run: python first_red_520_backtest.py
      - name: Run CAGR Check
        run: python check_cagr.py    # 不加 continue-on-error：挂了让 job 红以提醒
