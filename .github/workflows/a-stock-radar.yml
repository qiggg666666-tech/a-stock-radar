name: A-Stock Radar

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * *'   # 主策略：三线共振/周线宽松
    - cron: '40 8 * * *'   # 强势股延续（保守版）
    - cron: '50 8 * * *'   # 板块优选+信号流水线
    - cron: '00 9 * * *'   # PE/PB估值筛选
    - cron: '10 9 * * *'   # 520天首红信号
    - cron: '20 9 * * *'   # 每日大盘信号
    - cron: '30 9 * * *'   # MA5横盘筛选
    - cron: '40 9 * * *'   # 520日线低位综合筛选
    - cron: '50 9 * * *'   # 板块动量+估值分位
    - cron: '0 8 * * *'    # 资金异动监控（收盘后）
    - cron: '0 8 * * 5'    # 外资/中央结算持股监控（每周五收盘后）
    - cron: '10 8 * * *'   # 板块轮动预警（收盘后）
    - cron: '20 8 * * *'   # 指数MACD背离监控（收盘后）
    - cron: '30 8 * * *'   # 指数支撑阻力位（收盘后）
    - cron: '35 8 * * 1-5' # 量化信号分析（工作日收盘后）
    - cron: '45 8 * * 1-5' # COX -> 已升级为全板块选股(超卖反弹型)
    - cron: '55 8 * * *'   # MTF共振选股 -> 已升级为全市场(趋势共振型)
    - cron: '0 3 1 * *'    # 每月1号，重算校准表

jobs:
  main-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Main Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python main.py

  strong-continuation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '40 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Strong Continuation Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python strong_continuation.py

  sector-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '50 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Sector Pipeline
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python pipeline_sector_plus_signal.py

  valuation-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '00 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Valuation Screener (PE/PB)
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python valuation_screen.py

  first-red-520-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '10 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run 520-Day First Red Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python first_red_520.py

  daily-market-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '20 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Daily Market Signal
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python daily_market_signal.py

  ma5-sideways-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run MA5 Sideways Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python ma5_sideways.py

  ma520-bottom-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '40 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run MA520 Bottom Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python ma520_bottom_screener.py

  sector-momentum-valuation:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '50 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Sector Momentum + Valuation Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python sector_momentum_valuation.py

  market-fund-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Market Fund Alert
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python market_fund_alert.py

  foreign-holder-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * 5'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Foreign Holder Monitor
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python foreign_holder_monitor.py

  sector-rotation-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '10 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Sector Rotation Alert
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python sector_rotation_alert.py

  index-divergence-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '20 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Index Divergence Alert
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python index_divergence_alert.py

  index-support-resistance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Index Support Resistance
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python index_support_resistance.py

  quant-signal-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '35 8 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Chinese font (for chart rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei
      - name: Run Quant Signal Bot
        env:
          SERVERCHAN_KEY: ${{ secrets.SENDKEY }}
        run: python quant_signal_bot.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: quant-signal-results
          path: output/
          retention-days: 30

  # ===================== 升级区 1: COX -> 全板块选股(超卖反弹型) =====================
  cox-sector-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 45          # <== 改动: 25 -> 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '45 8 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Universal Sector Picker
        env:
          SERVERCHAN_KEY: ${{ secrets.SENDKEY }}   # 保持原映射, 勿动
          UNIVERSE: ACTIVE                          # <== 改动: 新增
          MAX_CANDIDATES: '500'                     # <== 改动: 新增
        run: python cox_sector_bot.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: cox-sector-results
          path: output/
          retention-days: 30

  # ===================== 升级区 2: MTF -> 全市场(趋势共振型) =====================
  mtf-resonance-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 90          # <== 改动: 180 -> 90 (快照初筛+并发后足够)
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '55 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run MTF Resonance Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}        # 保持原样 (脚本已兼容 SENDKEY/SERVERCHAN_KEY)
          UNIVERSE: ACTIVE                        # <== 改动: 新增
          MAX_CANDIDATES: '500'                   # <== 改动: 新增
        run: python mtf_resonance_screener.py
      - name: Upload results                      # <== 改动: 原 job 没有, 补上让 CSV/JSON 可下载
        uses: actions/upload-artifact@v4
        with:
          name: mtf-resonance-results
          path: output/
          retention-days: 30

  build-calibration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 1 * *'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Build Calibration
        run: python build_calibration.py
      - name: Commit calibration_table.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calibration_table.csv
          git diff --staged --quiet || git commit -m "自动更新: 大盘信号校准表 $(date +'%Y-%m-%d')"
          git push

  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Backtest
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python backtest.py
      - name: Run Breakout Calmar Backtest
        run: python breakout_calmar_backtest.py
      - name: Run First-Red-520 Backtest
        run: python first_red_520_backtest.py
      - name: Run CAGR Check
        run: python check_cagr.py
