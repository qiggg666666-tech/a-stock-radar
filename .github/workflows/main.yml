name: A-Stock Screener

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * *'

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # 明确安装所有必需库
          pip install akshare pandas requests baostock
          
      - name: Run Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python main.py
