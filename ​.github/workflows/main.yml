name: A-Stock Screener

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 16:30 执行 (UTC 8:30)
    - cron: '30 8 * * *'

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v3

      # 2. 配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests baostock

      # 4. 执行选股程序
      - name: Run Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: |
          python ${{ github.workspace }}/main.py

      # 5. 上传选股结果 (非常重要：保存你的 CSV 文件)
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: stock-report
          path: 选股结果.csv
