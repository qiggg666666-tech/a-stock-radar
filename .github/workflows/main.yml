name: A-Stock Screener

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'
    - cron: '30 7 * * *'

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install akshare pandas requests
      - name: Run Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        # 增加 ls -R 打印目录结构，并使用 github.workspace 绝对路径
        run: |
          ls -R
          python ${{ github.workspace }}/main.py
