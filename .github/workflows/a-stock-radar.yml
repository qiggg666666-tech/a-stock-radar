name: A-Stock Radar

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * *'   # 主策略：三线共振/周线宽松
    - cron: '40 8 * * *'   # 强势股延续（保守版）★已升级: 双源+板块(🏆强势/✅确认)
    - cron: '50 8 * * *'   # 板块优选+信号流水线
    - cron: '00 9 * * *'   # PE/PB估值筛选
    - cron: '10 9 * * *'   # 520天首红信号
    - cron: '20 9 * * *'   # 每日大盘信号
    - cron: '30 9 * * *'   # MA5横盘筛选 ★已升级: 双源+板块(🧱蓄势/🔥遇风口)
    - cron: '40 9 * * *'   # 520日线低位综合筛选
    - cron: '50 9 * * *'   # 板块动量+估值分位
    - cron: '0 8 * * *'    # 资金异动监控（收盘后）
    - cron: '0 8 * * 5'    # 外资/中央结算持股监控（每周五收盘后）
    - cron: '10 8 * * *'   # 板块轮动预警（收盘后）
    - cron: '20 8 * * *'   # 指数MACD背离监控（收盘后）
    - cron: '30 8 * * *'   # 指数支撑阻力位（收盘后）
    - cron: '35 8 * * 1-5' # 量化信号分析（工作日收盘后）
    - cron: '45 8 * * 1-5' # COX全板块选股(超卖反弹) ★已升级: 双源+板块(🌪️风口/⭐共振)
    - cron: '55 8 * * *'   # MTF共振选股(趋势起涨) ★已升级: 双源+板块(🌪️风口/⭐共振)
    - cron: '0 3 1 * *'    # 每月1号，重算校准表

# 说明: 顶层不加 permissions, 仅 build-calibration 在 job 级声明 contents: write (原样保留)
# 说明: 每个 job 的 if 都含 workflow_dispatch, 故网页点 Run workflow 会并发触发全部 job

jobs:
  # ===================== 未升级区 (原样保留, 勿改) =====================
  main-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Main Screener
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python main.py

  sector-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '50 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Sector Pipeline
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python pipeline_sector_plus_signal.py

  valuation-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '00 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Valuation Screener (PE/PB)
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python valuation_screen.py

  first-red-520-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '10 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install
