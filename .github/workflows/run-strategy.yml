name: Run Triple Cross Strategy

on:
  schedule:
    - cron: '0 8 * * *'    # 每天下午16:00 北京时间
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: pip install -r requirements.txt

    - name: 执行策略
      env:
        SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
      run: python main.py

    - name: 上传结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: strategy-results
        path: results.csv
